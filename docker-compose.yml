# Kronos Trading System - Docker Compose
# =====================================
version: '3.8'

services:
  kronos:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kronos
    restart: unless-stopped
    env_file:
      - path: .env
        required: true
        read_only: true
    environment:
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_SECRET_KEY=${OKX_SECRET_KEY}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE}
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
    volumes:
      - kronos_logs:/app/logs
      - kronos_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "https://www.okx.com/api/v5/general/time"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional Prometheus monitoring (commented out)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: kronos_prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'

volumes:
  kronos_logs:
  kronos_data:
